<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArchVista - Visor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #050608;
      color: #e5e7eb;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    #header {
      padding: 0.7rem 1rem;
      background: rgba(13,17,23,0.95);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-shrink: 0;
    }
    #title {
      font-size: 0.88rem;
      font-weight: 600;
      color: #f1f3f5;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #back-btn {
      padding: 0.35rem 0.75rem;
      font-size: 0.75rem;
      font-weight: 500;
      background: rgba(10,12,20,0.85);
      color: #e5e7eb;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.12s;
      white-space: nowrap;
    }
    #back-btn:hover { background: rgba(30,35,60,0.95); }
    #viewer-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
      position: relative;
    }
    #media-viewer {
      width: 100%;
      height: 100%;
    }
    video, audio {
      max-width: 100%;
      max-height: 100%;
      display: block;
      margin: auto;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    img {
      max-width: 95%;
      max-height: 95%;
      display: block;
      margin: auto;
      object-fit: contain;
    }
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #050608;
      gap: 1rem;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error {
      display: none;
      padding: 2rem;
      text-align: center;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div id="header">
    <div id="title">Cargando...</div>
    <button id="back-btn" onclick="window.location.href='index.html'">← Volver</button>
  </div>
  <div id="viewer-container">
    <div id="loading">
      <div class="spinner"></div>
      <p style="font-size: 0.85rem; color: #6b7280;">Cargando contenido...</p>
    </div>
    <div id="media-viewer"></div>
    <div id="error">
      <p>No se pudo cargar el contenido.</p>
      <p style="font-size: 0.75rem; margin-top: 0.5rem; color: #6b7280;">Tipo de archivo no soportado o archivo no encontrado.</p>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const file = params.get('file');
    const title = params.get('title') || 'Visor';
    const type = params.get('type');
    
    document.getElementById('title').textContent = title;
    
    if (!file) {
      showError();
    } else {
      loadMedia(file, type);
    }
    
    function loadMedia(file, type) {
      const viewer = document.getElementById('media-viewer');
      const loading = document.getElementById('loading');
      
      // Detectar tipo por extensión si no se especificó
      if (!type) {
        const ext = file.split('.').pop().toLowerCase();
        if (['mp4', 'webm', 'ogg'].includes(ext)) type = 'video';
        else if (['pdf'].includes(ext)) type = 'pdf';
        else if (['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg'].includes(ext)) type = 'imagen';
        else if (['mp3', 'wav', 'ogg', 'm4a'].includes(ext)) type = 'audio';
        else if (['html', 'htm'].includes(ext)) type = 'enlace';
      }
      
      try {
        switch(type) {
          case 'video':
            viewer.innerHTML = `<video controls autoplay>
              <source src="${file}" type="video/mp4">
              Tu navegador no soporta el elemento video.
            </video>`;
            break;
            
          case 'pdf':
            viewer.innerHTML = `<iframe src="${file}"></iframe>`;
            break;
            
          case 'imagen':
            const img = document.createElement('img');
            img.src = file;
            img.onload = () => hideLoading();
            img.onerror = () => showError();
            viewer.appendChild(img);
            return; // No hide loading yet
            
          case 'audio':
            viewer.innerHTML = `<audio controls autoplay>
              <source src="${file}" type="audio/mpeg">
              Tu navegador no soporta el elemento audio.
            </audio>`;
            break;
            
          case 'enlace':
            viewer.innerHTML = `<iframe src="${file}"></iframe>`;
            break;
            
          default:
            showError();
            return;
        }
        hideLoading();
      } catch(e) {
        showError();
      }
    }
    
    function hideLoading() {
      document.getElementById('loading').style.display = 'none';
    }
    
    function showError() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
    }
  </script>
</body>
</html>
