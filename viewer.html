<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArchVista - 3D Viewer</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #050608; color: #f5f5f5; font-family: system-ui, -apple-system, sans-serif; }
    canvas { display: block; }

    /* Loading overlay */
    #loading { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #050608; z-index: 100; gap: 1rem; pointer-events: none; }
    #loading.hidden { display: none; }
    .spinner { width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { margin: 0; font-size: 0.9rem; color: #9ca3af; letter-spacing: 0.02em; }

    /* Controls overlay (top-left) */
    #overlay { position: fixed; top: 10px; left: 10px; padding: 0.55rem 0.85rem; background: rgba(5,6,8,0.82); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; font-size: 0.75rem; max-width: 230px; pointer-events: none; line-height: 1.7; backdrop-filter: blur(4px); z-index: 10; }
    #overlay h1 { margin: 0 0 0.3rem 0; font-size: 0.82rem; font-weight: 600; color: #f5f5f5; }
    .ctrl-row { display: flex; gap: 0.5rem; margin: 0; color: #9ca3af; }
    .ctrl-key { color: #e5e7eb; font-weight: 500; min-width: 80px; flex-shrink: 0; }
    .mode-indicator { margin-top: 0.4rem; padding-top: 0.4rem; border-top: 1px solid rgba(255,255,255,0.07); color: #6b7280; font-size: 0.7rem; }
    .mode-indicator span { color: #3b82f6; font-weight: 600; }

    /* Side panels (Layers, Sun) */
    .side-panel { position: fixed; top: 10px; left: -260px; bottom: 10px; width: 250px; background: rgba(10,12,20,0.88); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; backdrop-filter: blur(8px); transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 20; display: flex; flex-direction: column; }
    .side-panel.open { left: 10px; }
    .panel-header { padding: 0.8rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: space-between; }
    .panel-header h2 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: #9ca3af; margin: 0; }
    .panel-content { flex: 1; overflow-y: auto; padding: 0.5rem 0; }

    /* Layer list */
    .layer-row { display: flex; align-items: center; gap: 0.6rem; padding: 0.4rem 1rem; cursor: pointer; }
    .layer-row:hover { background: rgba(255,255,255,0.03); }
    .layer-name { font-size: 0.78rem; color: #c9d1d9; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .layer-toggle { width: 32px; height: 18px; border-radius: 9px; background: rgba(59,130,246,0.3); position: relative; cursor: pointer; flex-shrink: 0; transition: background 0.15s; }
    .layer-toggle::after { content: ''; position: absolute; top: 3px; left: 3px; width: 12px; height: 12px; border-radius: 50%; background: #93c5fd; transition: transform 0.15s, background 0.15s; }
    .layer-toggle.off { background: rgba(107,114,128,0.25); }
    .layer-toggle.off::after { transform: translateX(0); background: #4b5563; }
    .layer-toggle:not(.off)::after { transform: translateX(14px); background: #93c5fd; }

    /* Sun panel fields */
    .panel-field { padding: 0.5rem 1rem; display: flex; flex-direction: column; gap: 0.3rem; }
    .panel-field label { font-size: 0.72rem; color: #6b7280; }
    .panel-field input[type=range] { width: 100%; accent-color: #3b82f6; cursor: pointer; }

    /* Toolbar (top-right) */
    .tr-tools { position: fixed; top: 10px; right: 10px; display: flex; flex-direction: column; gap: 6px; z-index: 10; }
    .tr-btn { padding: 0.42rem 0.85rem; font-size: 0.75rem; font-weight: 500; background: rgba(10,12,20,0.85); color: #9ca3af; border: 1px solid rgba(255,255,255,0.08); border-radius: 7px; cursor: pointer; backdrop-filter: blur(4px); transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
    .tr-btn:hover { background: rgba(25,28,50,0.95); color: #f5f5f5; }
    .tr-btn.panel-open { color: #3b82f6; border-color: rgba(59,130,246,0.3); background: rgba(59,130,246,0.05); }

    /* Bottom-center buttons */
    #style-modes { position: fixed; bottom: 56px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; z-index: 10; }
    .style-btn { padding: 0.28rem 0.65rem; font-size: 0.7rem; font-weight: 500; background: rgba(10,12,20,0.85); color: #9ca3af; border: 1px solid rgba(255,255,255,0.08); border-radius: 5px; cursor: pointer; backdrop-filter: blur(4px); transition: all 0.12s; }
    .style-btn.active { background: rgba(124,58,237,0.25); color: #a78bfa; border-color: rgba(124,58,237,0.5); }
    
    #cam-modes { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; z-index: 10; }
    .cam-btn { padding: 0.38rem 0.75rem; font-size: 0.75rem; font-weight: 500; background: rgba(10,12,20,0.85); color: #9ca3af; border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; cursor: pointer; backdrop-filter: blur(4px); transition: all 0.12s; }
    .cam-btn.active { background: rgba(59,130,246,0.2); color: #60a5fa; border-color: rgba(59,130,246,0.5); }

    #lock-hint { position: fixed; bottom: 96px; left: 50%; transform: translateX(-50%); padding: 0.35rem 0.9rem; background: rgba(0,0,0,0.7); border-radius: 20px; font-size: 0.72rem; color: #9ca3af; pointer-events: none; opacity: 0; transition: opacity 0.3s; white-space: nowrap; }
    #lock-hint.visible { opacity: 1; }
    #model-title { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); font-size: 0.78rem; font-weight: 500; color: #6b7280; pointer-events: none; z-index: 10; letter-spacing: 0.03em; white-space: nowrap; }
  </style>
</head>
<body>
  <div id="loading"><div class="spinner"></div><p>Loading model...</p></div>

  <div id="model-title">ArchVista Viewer</div>

  <div id="overlay">
    <h1>Controls</h1>
    <div id="orbit-controls">
      <div class="ctrl-row"><span class="ctrl-key">Left-drag</span> Orbit</div>
      <div class="ctrl-row"><span class="ctrl-key">Right-drag</span> Pan</div>
      <div class="ctrl-row"><span class="ctrl-key">Scroll</span> Zoom</div>
    </div>
    <div id="walk-controls" style="display:none">
      <div class="ctrl-row"><span class="ctrl-key">W A S D</span> Walk</div>
      <div class="ctrl-row"><span class="ctrl-key">Mouse</span> Look around</div>
    </div>
    <div id="fly-controls" style="display:none">
      <div class="ctrl-row"><span class="ctrl-key">W A S D</span> Move</div>
      <div class="ctrl-row"><span class="ctrl-key">Space/Shift</span> Up/Down</div>
    </div>
    <div id="ortho-controls" style="display:none">
      <div class="ctrl-row"><span class="ctrl-key">Drag</span> Pan</div>
      <div class="ctrl-row"><span class="ctrl-key">Scroll</span> Zoom</div>
    </div>
    <div class="mode-indicator">Mode: <span id="mode-label">Orbit</span></div>
  </div>

  <!-- Panels -->
  <div id="panel-layers" class="side-panel">
    <div class="panel-header"><h2>Layers</h2></div>
    <div id="layer-list" class="panel-content"></div>
  </div>

  <div id="panel-sun" class="side-panel">
    <div class="panel-header"><h2>Lighting</h2></div>
    <div class="panel-content">
      <div class="panel-field">
        <label>Azimuth (Direction)</label>
        <input type="range" min="0" max="360" value="45" oninput="setSunAzimuth(this.value)">
      </div>
      <div class="panel-field">
        <label>Altitude (Height)</label>
        <input type="range" min="5" max="90" value="45" oninput="setSunAltitude(this.value)">
      </div>
      <div class="panel-field">
        <label>Intensity</label>
        <input type="range" min="0.1" max="3" step="0.1" value="1.1" oninput="setSunIntensity(this.value)">
      </div>
    </div>
  </div>

  <div class="tr-tools">
    <button class="tr-btn" onclick="window.location.href='index.html'">← Gallery</button>
    <button id="btn-layers" class="tr-btn" onclick="togglePanel('layers')">Layers</button>
    <button id="btn-sun" class="tr-btn" onclick="togglePanel('sun')">Lighting</button>
    <button class="tr-btn" onclick="resetCamera()">↺ Reset View</button>
  </div>

  <div id="style-modes">
    <button class="style-btn active" data-style="rendered" onclick="applyStyle('rendered')">Rendered</button>
    <button class="style-btn" data-style="clay" onclick="applyStyle('clay')">Clay</button>
    <button class="style-btn" data-style="wireframe" onclick="applyStyle('wireframe')">Wireframe</button>
    <button class="style-btn" data-style="xray" onclick="applyStyle('xray')">X-Ray</button>
  </div>

  <div id="cam-modes">
    <button class="cam-btn active" data-mode="orbit" onclick="setCameraMode('orbit')">1 · Orbit</button>
    <button class="cam-btn" data-mode="walk" onclick="setCameraMode('walk')">2 · Walk</button>
    <button class="cam-btn" data-mode="fly" onclick="setCameraMode('fly')">3 · Fly</button>
    <button class="cam-btn" data-mode="ortho" onclick="setCameraMode('ortho')">4 · Top View</button>
  </div>

  <div id="lock-hint">Click to lock cursor — Esc to release</div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.137.5/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.137.5/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/rhino3dm@8.4.0/rhino3dm.min.js"></script>
  <script src="viewer-3dm.js"></script>
  <script>
    document.addEventListener('modchange', function(e) {
      ['orbit','walk','fly','ortho'].forEach(m => {
        document.getElementById(m+'-controls').style.display = (e.detail===m)?'':'none';
      });
      document.getElementById('lock-hint').classList.toggle('visible', e.detail==='walk'||e.detail==='fly');
    });

    (function(){
      const p = new URLSearchParams(window.location.search);
      const m = p.get('model')||'';
      const name = m.replace(/\.3dm$/i,'').replace(/[-_]/g,' ');
      const el = document.getElementById('model-title');
      if(el && name) el.textContent = name;
    })();

    let openPanelId = null;
    function togglePanel(id) {
      const target = document.getElementById('panel-' + id);
      const btn = document.getElementById('btn-' + id);
      const isOpen = target.classList.contains('open');

      document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('open'));
      document.querySelectorAll('.tr-btn').forEach(b => b.classList.remove('panel-open'));

      if (!isOpen) {
        target.classList.add('open');
        btn.classList.add('panel-open');
        openPanelId = id;
      } else {
        openPanelId = null;
      }
    }
  </script>
</body>
</html>
