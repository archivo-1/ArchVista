<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArchVista - 3D Viewer</title>
    <style>
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #050608; color: #f5f5f5; font-family: system-ui, -apple-system, sans-serif; }
        canvas { display: block; }

        #loading {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: #050608; z-index: 100; gap: 1rem;
            pointer-events: none;
        }
        #loading.hidden { display: none; }
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #3b82f6;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading p { margin: 0; font-size: 0.9rem; color: #9ca3af; letter-spacing: 0.02em; }

        #overlay {
            position: fixed; top: 10px; left: 10px;
            padding: 0.55rem 0.85rem;
            background: rgba(5, 6, 8, 0.78);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px; font-size: 0.78rem; max-width: 280px;
            pointer-events: none; line-height: 1.6; backdrop-filter: blur(4px);
        }
        #overlay h1 { margin: 0 0 0.35rem 0; font-size: 0.85rem; font-weight: 600; color: #f5f5f5; }
        #overlay .ctrl-row { display: flex; gap: 0.5rem; margin: 0; color: #9ca3af; }
        #overlay .ctrl-key { color: #e5e7eb; font-weight: 500; min-width: 90px; flex-shrink: 0; }
        #overlay .mode-indicator { margin-top: 0.4rem; padding-top: 0.4rem; border-top: 1px solid rgba(255,255,255,0.07); color: #6b7280; font-size: 0.72rem; }
        #overlay .mode-indicator span { color: #3b82f6; font-weight: 600; }

        #back-btn {
            position: fixed; top: 10px; right: 10px;
            padding: 0.42rem 0.85rem; font-size: 0.8rem; font-weight: 500;
            background: rgba(10, 12, 20, 0.85); color: #f5f5f5;
            border: 1px solid rgba(255,255,255,0.1); border-radius: 7px;
            cursor: pointer; backdrop-filter: blur(4px); transition: background 0.15s; z-index: 10;
        }
        #back-btn:hover { background: rgba(25, 28, 50, 0.95); }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <p>Loading model...</p>
    </div>

    <div id="overlay">
        <h1>Controls</h1>
        <div class="ctrl-row"><span class="ctrl-key">Left-drag</span><span>Orbit</span></div>
        <div class="ctrl-row"><span class="ctrl-key">Right-drag</span><span>Pan</span></div>
        <div class="ctrl-row"><span class="ctrl-key">Scroll</span><span>Zoom</span></div>
        <div class="ctrl-row"><span class="ctrl-key">F</span><span>Toggle Free-Fly</span></div>
        <div class="ctrl-row"><span class="ctrl-key">Click (fly)</span><span>Lock cursor</span></div>
        <div class="ctrl-row"><span class="ctrl-key">W A S D</span><span>Move horizontally</span></div>
        <div class="ctrl-row"><span class="ctrl-key">Space / Shift</span><span>Up / Down</span></div>
        <div class="ctrl-row"><span class="ctrl-key">Mouse (fly)</span><span>Look around</span></div>
        <div class="ctrl-row"><span class="ctrl-key">Esc</span><span>Release cursor</span></div>
        <div class="mode-indicator">Mode: <span id="mode-label">Orbit</span></div>
    </div>

    <button id="back-btn" onclick="window.location.href='index.html'">&#8592; Back to Library</button>

    <script src="https://cdn.jsdelivr.net/npm/three@0.137.5/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.137.5/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/rhino3dm@8.4.0/rhino3dm.min.js"></script>
    <script src="viewer-3dm.js"></script>
</body>
</html>
