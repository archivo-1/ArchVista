<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Internet Infrastructure – Rhino 3D Library</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0b0c10;
      color: #f5f5f5;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #222;
    }
    h1 {
      margin: 0;
      font-size: 1.3rem;
    }
    main {
      padding: 1.5rem;
      flex: 1;
    }
    .model-card {
      background: #14161d;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid #222;
    }
    .model-info {
      max-width: 70%;
    }
    .model-title {
      margin: 0 0 0.25rem 0;
      font-size: 1rem;
      font-weight: 600;
    }
    .model-desc {
      margin: 0;
      font-size: 0.85rem;
      color: #a4a7b3;
    }
    .btn {
      background: #2c7cf4;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 0.5rem 1rem;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .btn:hover {
      background: #3b89ff;
    }
    footer {
      padding: 0.75rem 1.5rem;
      font-size: 0.75rem;
      color: #777;
      border-top: 1px solid #222;
    }
  </style>
</head>
<body>
  <header>
    <h1>Internet Infrastructure – Rhino 3D Library</h1>
  </header>
  <main>
    <div class="model-card">
      <div class="model-info">
        <h2 class="model-title">Torpederas – Valparaíso Cable Landing Station (Rhino)</h2>
        <p class="model-desc">
          Path from the beach to the cable landing station, modeled in Rhino (.3dm).
        </p>
      </div>
      <button class="btn" onclick="openViewer('torpederas-valparaisoCLS.3dm')">
        Open model
      </button>
    </div>
  </main>
  <footer>
    Orbit by default. Press F for Free‑Fly (WASD + mouse).
  </footer>

  <script>
    function openViewer(modelFile) {
      const url = new URL('viewer.html', window.location.href);
      url.searchParams.set('model', modelFile);
      window.location.href = url.toString();
    }
  </script>
</body>
</html>
